<!DOCTYPE html>
<html>
<head>
    <title>Contact Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">

<h2 class="text-center mb-4 fw-bold text-primary">📇 Contact Manager</h2>

<div class="card p-3 mb-4">
    <form action="/add" method="post">
        <div class="row">
            <div class="col">
                <input type="number" name="userid" class="form-control" placeholder="User ID" required>
            </div>
            <div class="col">
                <input type="text" name="username" class="form-control" placeholder="Name" required>
            </div>
            <div class="col">
                <input type="text" name="phone" class="form-control" placeholder="Phone" required>
            </div>
            <div class="col">
                <button class="btn btn-primary w-100">Add</button>
            </div>
        </div>
    </form>
</div>

<div class="card p-3 shadow-sm">
    <table class="table table-striped table-hover">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Action</th>
        </tr>

        {% for user in users %}
        <tr>
            <td>{{ user.id }}</td>
            <td>{{ user.name }}</td>
            <td>{{ user.phone }}</td>
            <td>
                <a href="/delete/{{ user.id }}" class="btn btn-danger btn-sm rounded-pill">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>

<div class="card p-3 mt-4">
    <h4 class="mb-3">Update Contact</h4>
    <form action="/update" method="post">
        <div class="row">
            <div class="col">
                <input type="number" name="userid" class="form-control" placeholder="User ID" required>
            </div>
            <div class="col">
                <input type="text" name="username" class="form-control" placeholder="New Name" required>
            </div>
            <div class="col">
                <input type="text" name="phone" class="form-control" placeholder="New Phone" required>
            </div>
            <div class="col">
                <button class="btn btn-warning w-100">Update</button>
            </div>
        </div>
    </form>
</div>

</div>
</body>
</html>
